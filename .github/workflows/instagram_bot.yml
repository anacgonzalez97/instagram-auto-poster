name: Publicar en Instagram

on:
  schedule:
    # 08:00 UTC cada dia. Barcelona = UTC+1 (invierno) / UTC+2 (verano).
    # Ejemplo: para las 09:00 de Barcelona en invierno, deja "0 8 * * *".
    - cron: "0 8 * * *"
  workflow_dispatch:  # permite lanzarlo manualmente desde la pestana Actions

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        env:
          # ---- Estos nombres deben coincidir EXACTO con tus GitHub Secrets ----
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # ---- Estos dos NO son secrets, son opciones normales ----
          PUBLISH_TYPE: "POST"    # POST o STORY
          SELECT_MODE: "FIRST"    # FIRST o RANDOM
          CAROUSEL_COUNT: "3"
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python publish_instagram.py
        
