name: Publicar en Instagram
on:
  schedule:
    # 08:00 UTC cada dia. Barcelona = UTC+1 (invierno) / UTC+2 (verano).
    - cron: "0 20 * * *"
  workflow_dispatch:  # permite lanzarlo manualmente desde la pestana Actions
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Ejecutar script
        env:
          # ---- Estos nombres deben coincidir EXACTO con tus GitHub Secrets ----
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          PROCESSED_FOLDER_ID: ${{ secrets.PROCESSED_FOLDER_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GH_PAT: ${{ secrets.GH_PAT }}
          # ---- Estos NO son secrets, son opciones normales ----
          SELECT_MODE: "FIRST"    # FIRST o RANDOM (solo para imagenes sin numerar)
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python publish_instagram.py
